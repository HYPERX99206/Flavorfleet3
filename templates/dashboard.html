{% extends "base.html" %}

{% block content %}

<div class="dashboard">

<h1>Welcome {{ username }}</h1>

<p>Explore restaurants and manage your orders.</p>

<div class="dashboard-actions">

<a href="/restaurants" class="dash-btn">
Browse Restaurants
</a>

<a href="/orders" class="dash-btn">
My Orders
</a>

<a href="/cart" class="dash-btn">
My Cart
</a>

<a href="/logout" class="dash-btn logout">
Logout
</a>

</div>

</div>

<style>

.dashboard{
max-width:800px;
margin:auto;
text-align:center;
padding:40px;
}

.dashboard-actions{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-top:30px;
}

.dash-btn{
display:block;
padding:20px;
background:#ff4d4d;
color:white;
text-decoration:none;
border-radius:10px;
font-size:18px;
}

.logout{
background:#333;
}

.dash-btn:hover{
opacity:0.9;
}

</style>

{% endblock %}
