{% extends "base.html" %}

{% block content %}

<h1>Meal Reminders</h1>

<form method="POST">
<label>Reminder Message</label>
<input type="text" name="message" placeholder="Eat your breakfast" required>

<label>Reminder Time</label>
<input type="time" name="remind_time" required>

<button type="submit">Add Reminder</button>
</form>

<h2>Your Reminders</h2>

{% if reminders|length > 0 %}
    {% for r in reminders %}
    <div class="dash-card">
        <p>Message: {{ r.message }}</p>
        <p>Time: {{ r.remind_time }}</p>
    </div>
    {% endfor %}
{% else %}
<p>No reminders yet.</p>
{% endif %}

{% endblock %}
