{% extends "base.html" %}

{% block content %}

<h1>Your Cart</h1>

{% if items %}

{% for item in items %}

<div class="cart-item">

<div>

<h3>{{ item.name }}</h3>

<p>₹ {{ item.price }}</p>

</div>

<a href="/remove_from_cart/{{ item.id }}" class="remove-btn">
Remove
</a>

</div>

{% endfor %}

<a href="/checkout" class="checkout-btn">
Proceed to Checkout
</a>

{% else %}

<p>Your cart is empty</p>

{% endif %}

{% endblock %}
