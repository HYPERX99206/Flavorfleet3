{% extends "base.html" %}

{% block content %}

<h1>Your Orders</h1>

{% if orders %}

    {% for o in orders %}

    <div class="order-card">
        <p><strong>Order ID:</strong> {{ o.id }}</p>
        <p><strong>Total:</strong> ₹ {{ o.total_amount }}</p>
        <p><strong>Status:</strong> {{ o.status }}</p>
    </div>

    {% endfor %}

{% else %}

<p>No orders yet.</p>

{% endif %}

{% endblock %}
